name: Git Rebase

# Reusing the special GitHub action 'git-rebase' inside of a pre-defined
# and static execution matrix, read from a YAML notated file given by
# the required input parameter 'matrix' with following expected content:
#
# to:      list of destination organisations, either as public git+https or
#          protected (private) git+ssh base URI; multiple entries allowed
#
# repo:    list of multiple repository that have to exist on both, source
#          and destination organisations
#
# refspec: list of multiple Git refspecs that have to rebase on all Git repos

# https://docs.github.com/en/actions/sharing-automations/reusing-workflows
on:
  workflow_call:
    inputs:
      matrix:
        description: "YAML file with matrix axises."
        required: true
        type: string

      to-repo-prefix:
        description: "Prefix to all destination repository names."
        required: false
        default: ""
        type: string

      to-repo-suffix:
        description: "Suffix to all destination repository names."
        required: false
        default: ""
        type: string

      refspec-prefix:
        description: "Prefix to all Git refspecs as custodian on destination."
        required: true
        type: string

      secret-prefix:
        description: "Construct the secret variable name with that prefix."
        required: false
        default: ""
        type: string

      secret-suffix:
        description: "Construct the secret variable name with that suffix."
        required: false
        default: ""
        type: string

run-name: Git Rebase
        
# Cancel already running workflows regardless of their references.
# This prevents GitHub workflows from running in parallel (avoiding
# invalidation of build caches).
concurrency:
  # group: ${{ github.workflow }}-${{ github.repository_id }}-${{ github.ref }}
  group: ${{ github.workflow }}-${{ github.repository_id }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.set-git-rebase-matrix.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Load matrix data
        id: set-git-rebase-matrix
        run: |
          echo "matrix=$(yq -o json '. ' ${{ inputs.matrix }} | jq -c .)" >> $GITHUB_OUTPUT

  execute:
    name: Execute
    runs-on: ubuntu-latest

    needs:
      - setup

    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Generate Secret String
        run: |
          varname_prefix="${{ inputs.secret-prefix }}"
          varname_unique="$(echo '${{ matrix.repo }}' | tr '[:punct:]' '_' | tr '[:lower:]' '[:upper:]')"
          varname_suffix="${{ inputs.secret-suffix }}"
          varname="${varname_prefix}${varname_unique}${varname_suffix}"
          echo "SECRET_STRING=${varname}" >> $GITHUB_ENV

      - name: Rebase Custodians Git Refspecs
        uses: tiacsys/git-rebase@v1
        with:
          repo: "${{ matrix.to }}/${{ inputs.to-repo-prefix }}${{ matrix.repo }}${{ inputs.to-repo-suffix }}.git"
          source_branch: "${{ inputs.refspec-prefix }}/${{ matrix.refspec }}"
          destination_branch: "${{ matrix.refspec }}"
          ssh_private_key: "${{ secrets[env.SECRET_STRING] }}"
